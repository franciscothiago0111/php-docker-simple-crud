version: '3.8'

services:
  php-apache:
    build: .
    container_name: php_apache_container
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html # Mapeando a pasta php-docker inteira para o contêiner

    depends_on:
      - db # Garante que o MySQL esteja ativo antes do PHP

  db:
    image: mysql:8.0
    container_name: mysql_container
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: crud_php
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin_container
    depends_on:
      - db
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root

volumes:
  db_data:
